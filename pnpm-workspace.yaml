packages:
  - 'apps/*'
  - 'packages/*'
  - 'e2e'

allowBuilds:
  argon2: true
  esbuild: true
  msgpackr-extract: true
  sharp: true
  unrs-resolver: true

onlyBuiltDependencies:
  - argon2
  - esbuild
  - msgpackr-extract
  - sharp
  - unrs-resolver

overrides:
  ioredis: '5.11.1'
  # Transitive-only vulnerabilities (osv-scanner, task 014): next@15.5.20
  # bundles its own old postcss internally; drizzle-kit pulls esbuild via
  # the deprecated @esbuild-kit/* packages. Neither is a direct dependency
  # we control the version of otherwise.
  postcss: '>=8.5.10'
  esbuild: '>=0.25.0'
  # vite 5.4.21 (pulled in transitively by vitest@3.2.7) has 3 known CVEs
  # (GHSA-4w7w-66w2-5vf9, GHSA-fx2h-pf6j-xcff, GHSA-v6wh-96g9-6wx3), fixed
  # in 6.4.3. vitest@3.2.7 only accepts vite ^5 || ^6 || ^7 — capped below
  # 8.x since an unbounded floor let it drift to an unsupported major.
  vite: '>=6.4.3 <7.0.0'
  # M4 lockfile-merge scan (osv-scanner): next@15.5.20 has 7 CVEs, patched
  # in 15.5.21 (within the existing ^15.1.4 range in apps/web, just needed
  # forcing). sharp is next's own optional dependency (image optimization),
  # not ours to version otherwise. fast-uri/find-my-way are transitive via
  # fastify/ajv; two fast-uri major lines (3.x via one consumer, 4.x via
  # another) both need pinning independently or one override would break
  # the other's consumer.
  next: '>=15.5.21'
  sharp: '>=0.35.0'
  find-my-way: '>=9.7.0'
  fast-uri@3.1.3: '3.1.4'
  fast-uri@4.1.0: '4.1.1'
